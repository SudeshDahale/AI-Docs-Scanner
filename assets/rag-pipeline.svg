<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: sans-serif; background: white;">
  <title>DocuMind-AI RAG Pipeline</title>
  <desc>Horizontal RAG pipeline from upload through chunking, embedding, storage, retrieval, and generation</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Row labels -->
  <text font-size="12" fill="#888780" x="340" y="22" text-anchor="middle">upload phase</text>
  <text font-size="12" fill="#888780" x="340" y="192" text-anchor="middle">query phase</text>

  <!-- ── UPLOAD ROW ─────────────────────────────────── -->
  <!-- pdf.py -->
  <g>
    <rect x="20" y="32" width="108" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="74" y="53" text-anchor="middle" dominant-baseline="central">pdf.py</text>
    <text font-size="12" fill="#0F6E56" x="74" y="71" text-anchor="middle" dominant-baseline="central">Extract text</text>
  </g>
  <line x1="128" y1="58" x2="146" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- chunking.py -->
  <g>
    <rect x="146" y="32" width="108" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="200" y="53" text-anchor="middle" dominant-baseline="central">chunking.py</text>
    <text font-size="12" fill="#0F6E56" x="200" y="71" text-anchor="middle" dominant-baseline="central">Page chunks</text>
  </g>
  <line x1="254" y1="58" x2="272" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- embedding.py -->
  <g>
    <rect x="272" y="32" width="108" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="326" y="53" text-anchor="middle" dominant-baseline="central">embedding.py</text>
    <text font-size="12" fill="#0F6E56" x="326" y="71" text-anchor="middle" dominant-baseline="central">Batch + retry</text>
  </g>
  <line x1="380" y1="58" x2="398" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- retrieval.py build -->
  <g>
    <rect x="398" y="32" width="108" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="452" y="53" text-anchor="middle" dominant-baseline="central">retrieval.py</text>
    <text font-size="12" fill="#0F6E56" x="452" y="71" text-anchor="middle" dominant-baseline="central">Build FAISS</text>
  </g>
  <line x1="506" y1="58" x2="524" y2="58" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- storage -->
  <g>
    <rect x="524" y="32" width="136" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#2C2C2A" x="592" y="53" text-anchor="middle" dominant-baseline="central">storage/</text>
    <text font-size="12" fill="#5F5E5A" x="592" y="71" text-anchor="middle" dominant-baseline="central">indexes + chunks</text>
  </g>

  <!-- ── DIVIDER ──────────────────────────────────────── -->
  <line x1="20" y1="106" x2="660" y2="106" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ── QUERY ROW ──────────────────────────────────── -->
  <!-- User -->
  <g>
    <rect x="20" y="202" width="108" height="52" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#2C2C2A" x="74" y="223" text-anchor="middle" dominant-baseline="central">User query</text>
    <text font-size="12" fill="#5F5E5A" x="74" y="241" text-anchor="middle" dominant-baseline="central">+ history</text>
  </g>
  <line x1="128" y1="228" x2="146" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- retrieval search -->
  <g>
    <rect x="146" y="202" width="108" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#085041" x="200" y="223" text-anchor="middle" dominant-baseline="central">retrieval.py</text>
    <text font-size="12" fill="#0F6E56" x="200" y="241" text-anchor="middle" dominant-baseline="central">Top-k search</text>
  </g>
  <line x1="254" y1="228" x2="272" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- generation -->
  <g>
    <rect x="272" y="202" width="108" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#4A1B0C" x="326" y="223" text-anchor="middle" dominant-baseline="central">generation.py</text>
    <text font-size="12" fill="#993C1D" x="326" y="241" text-anchor="middle" dominant-baseline="central">GPT-4.1-mini</text>
  </g>
  <line x1="380" y1="228" x2="398" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- answer + citations -->
  <g>
    <rect x="398" y="202" width="108" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#26215C" x="452" y="223" text-anchor="middle" dominant-baseline="central">Response</text>
    <text font-size="12" fill="#534AB7" x="452" y="241" text-anchor="middle" dominant-baseline="central">Answer + citations</text>
  </g>

  <!-- storage read arrow -->
  <path d="M592 84 L592 154 L200 154 L200 200" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text font-size="12" fill="#888780" x="400" y="148" text-anchor="middle">read index</text>

  <!-- config -->
  <g>
    <rect x="524" y="202" width="136" height="52" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text font-size="14" font-weight="500" fill="#412402" x="592" y="223" text-anchor="middle" dominant-baseline="central">core/config.py</text>
    <text font-size="12" fill="#854F0B" x="592" y="241" text-anchor="middle" dominant-baseline="central">.env settings</text>
  </g>

  <!-- legend -->
  <rect x="20" y="290" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="38" y="301" dominant-baseline="central">pipeline services</text>
  <rect x="160" y="290" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="178" y="301" dominant-baseline="central">LLM generation</text>
  <rect x="300" y="290" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="318" y="301" dominant-baseline="central">API layer</text>
  <rect x="400" y="290" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="418" y="301" dominant-baseline="central">config</text>
  <rect x="480" y="290" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="12" fill="#5F5E5A" x="498" y="301" dominant-baseline="central">storage / user</text>
</svg>
